services:
  app:
    build: .
    container_name: cinema_app
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
  db:
    image: postgres:18.0
    container_name: cinema_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql


  redis:
    image: redis:8.6.3
    container_name: cinema_redis
    restart: always
    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: cinema_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  celery_worker:
    build: .
    container_name: cinema_celery_worker
    restart: always
    command: celery -A celery_app.worker worker --loglevel=info
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      - redis
      - db

  celery_beat:
    build: .
    container_name: cinema_celery_beat
    restart: always
    command: celery -A celery_app.worker beat --loglevel=info
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      - redis
      - db

  mailhog:
    image: mailhog/mailhog
    container_name: cinema_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
volumes:
  postgres_data:
  minio_data:
  redis_data:

