version: '3.8'

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: cinema_db_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cinema_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_password@db:5432/cinema_db_test
      REDIS_URL: redis://redis:6379/0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_HOST: db
      POSTGRES_DB_PORT: 5432
      POSTGRES_DB: cinema_db_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY_ACCESS: "supersecret"
      SECRET_KEY_REFRESH: "supersecret"
      EMAIL_HOST: smtp.dummy.com
      EMAIL_PORT: 587
      EMAIL_HOST_USER: dummy
      EMAIL_HOST_PASSWORD: dummy
      EMAIL_USE_TLS: true
      SWAGGER_USER: admin
      SWAGGER_PASSWORD: admin
      S3_STORAGE_HOST: localhost
      S3_STORAGE_PORT: 9000
      S3_STORAGE_ACCESS_KEY: dummy
      S3_STORAGE_SECRET_KEY: dummy
      S3_BUCKET_NAME: dummy-bucket
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: poetry run pytest src/tests/e2e/