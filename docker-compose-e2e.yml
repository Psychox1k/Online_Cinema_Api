version: '3.8'

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cinema_db_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cinema_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/cinema_db_test
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_ACCESS: "supersecret"
      SECRET_KEY_REFRESH: "supersecret"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: poetry run pytest src/tests/e2e/