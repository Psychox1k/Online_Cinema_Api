name: CI Pipeline

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code styling
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Run flake8
        run: |
          poetry run flake8 src

      - name: Run black
        run: |
          poetry run black src --check

  testing:
    needs: linting
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        ports: [5432:5432]
        env: {POSTGRES_DB: cinema_db_test, POSTGRES_USER: user, POSTGRES_PASSWORD: password}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.14" }
      - run: pip install poetry && poetry install
      - env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/cinema_db_test
        run: poetry run pytest src/tests/unit src/tests/integration

  testing_e2e:
    needs: testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests in Docker
        run: |
          docker compose -f docker-compose-e2e.yml up --build --abort-on-container-exit --exit-code-from web
