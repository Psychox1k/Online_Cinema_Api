name: CI Pipeline

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code styling
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Run flake8
        run: |
          poetry run flake8 src

      - name: Run black
        run: |
          poetry run black src --check

  testing:
    needs: linting
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        ports: [5432:5432]
        env: {POSTGRES_DB: cinema_db_test, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres_password}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install poetry && poetry install
      - name: Run unit and integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres_password@localhost:5432/cinema_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_HOST: localhost
          POSTGRES_DB_PORT: 5432
          POSTGRES_DB: cinema_db_test
          SECRET_KEY_ACCESS: supersecret_access
          SECRET_KEY_REFRESH: supersecret_refresh
          EMAIL_HOST: smtp.dummy.com
          EMAIL_PORT: 587
          EMAIL_HOST_USER: dummy
          EMAIL_HOST_PASSWORD: dummy
          EMAIL_USE_TLS: true
          SWAGGER_USER: admin
          SWAGGER_PASSWORD: admin
          S3_STORAGE_HOST: localhost
          S3_STORAGE_PORT: 9000
          S3_STORAGE_ACCESS_KEY: dummy
          S3_STORAGE_SECRET_KEY: dummy
          S3_BUCKET_NAME: dummy-bucket
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: poetry run pytest src/tests/unit src/tests/integration

  testing_e2e:
    needs: testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests in Docker
        run: |
          docker compose -f docker-compose-e2e.yml up --build --abort-on-container-exit --exit-code-from web
